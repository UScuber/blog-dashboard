<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Document -->
  <rect x="4" y="6" width="40" height="52" rx="5" ry="5" fill="#f1f5f9" stroke="#334155" stroke-width="3"/>
  <!-- Text lines -->
  <line x1="13" y1="22" x2="35" y2="22" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <line x1="13" y1="31" x2="35" y2="31" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <line x1="13" y1="40" x2="26" y2="40" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <!-- Pencil (rotated -45deg) -->
  <g transform="rotate(-45 49 25)">
    <!-- Body (no rx, extended left to overlap under tip) -->
    <rect x="28" y="20" width="28" height="10" fill="#3b82f6"/>
    <!-- Eraser (extended left to overlap under body, rx only on right end) -->
    <rect x="52" y="20" width="10" height="10" rx="2" fill="#fb7185"/>
    <!-- Small rect to square off eraser left edge under body overlap -->
    <rect x="52" y="20" width="4" height="10" fill="#fb7185"/>
    <!-- Tip (drawn on top, covers body left edge) -->
    <polygon points="28,20 28,30 22,25" fill="#334155"/>
  </g>
</svg>
